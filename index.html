<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCALEit Business Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lato:wght@300;400;700;900&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: [
              "Lato",
              "-apple-system",
              "BlinkMacSystemFont",
              "Segoe UI",
              "sans-serif",
            ],
            serif: ["Cinzel", "serif"],
          },
          colors: {
            // Brand Foundations
            primary: "#0C2340", // Navy (Ink)
            "on-primary": "#FFFFFF",

            secondary: "#C89720", // Gold (Highlighter/Accent)
            "on-secondary": "#FFFFFF",

            accent: "#C89720", // Explicit Accent token
            "on-accent": "#FFFFFF",

            // Neutrals & Backgrounds
            background: "#FAFAFA", // Very Light (almost white)
            "on-background": "#000000",

            surface: "#FFFFFF", // Pure White
            "on-surface": "#000000",

            "surface-variant": "#F7F6F5", // Neutral 200
            "on-surface-variant": "#1a1a1a", // Dark text for better legibility

            outline: "#E3E1DE", // Neutral 300

            // Semantic Colors
            error: "#C53A32",
            "on-error": "#FFFFFF",
            "error-container": "#FFDAD6",
            "on-error-container": "#410002",

            success: "#178A3D",
            warning: "#E2A300",
            info: "#1669B5",

            // Legacy mappings for containers (using brand tints)
            "primary-container": "#E3E8EE", // Light Navy tint
            "on-primary-container": "#0C2340",
            "secondary-container": "#FDF2D0", // Light Gold tint
            "on-secondary-container": "#5C4200",
            "tertiary-container": "#E0F2F1", // Teal tint (kept for variety or map to Brand)
            "on-tertiary-container": "#004D40",
            tertiary: "#C89720", // Mapping tertiary to Gold to maintain design consistency
          },
          borderRadius: {
            none: "0",
            sm: "0.125rem",
            DEFAULT: "8px", // Global radius
            md: "0.5rem",
            lg: "0.75rem",
            xl: "1rem",
            "2xl": "1.5rem",
            "3xl": "2rem",
            full: "999px", // Pills
          },
          boxShadow: {
            sm: "0 2px 6px rgba(0,0,0,0.06)", // Level 1
            md: "0 10px 24px rgba(0,0,0,0.12)", // Level 2
            lg: "0 18px 40px rgba(0,0,0,0.18)", // Level 3
            soft: "0 4px 20px -2px rgba(12, 35, 64, 0.1)",
          },
          keyframes: {
            fadeInUp: {
              "0%": { opacity: "0", transform: "translateY(10px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
          },
          animation: {
            "fade-in-up": "fadeInUp 0.5s ease-out forwards",
            "fade-in-up-fast": "fadeInUp 0.3s ease-out forwards",
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --color-primary: #0c2340;
      --color-accent: #c89720;
      --color-bg-soft: #fafafa;
      --color-text-body: #000000;
      --transition-fast: 150ms;
      --transition-normal: 200ms;
      --transition-slow: 300ms;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    body {
      font-family: "Lato", sans-serif;
      font-weight: 400;
      /* Normal for body text */
      color: #000000;
      background-color: #fafafa;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== TYPOGRAPHY SYSTEM ===== */
    /* Headings: Cinzel Medium #0c2340 */
    h1,
    h2,
    h3,
    .font-serif {
      font-family: "Cinzel", serif;
      color: #0c2340;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    h1 {
      font-size: 40px;
      line-height: 1.2;
    }

    h2 {
      font-size: 32px;
      line-height: 1.25;
    }

    h3 {
      font-size: 24px;
      line-height: 1.3;
    }

    /* Subheadings: Lato Bold #0c2340 */
    h4,
    h5,
    h6,
    .subheading {
      font-family: "Lato", sans-serif;
      font-weight: 700;
      color: #0c2340;
      letter-spacing: 0.02em;
    }

    h4 {
      font-size: 18px;
    }

    h5 {
      font-size: 16px;
    }

    h6 {
      font-size: 14px;
    }

    /* Body Text: Lato Normal #000000 */
    p,
    .text-body,
    span,
    li {
      font-weight: 400;
      line-height: 1.6;
      color: #000000;
    }

    .font-bold {
      font-weight: 700;
    }

    /* ===== MATERIAL UI ANIMATIONS ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes ripple {
      0% {
        transform: scale(0);
        opacity: 0.5;
      }

      100% {
        transform: scale(4);
        opacity: 0;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    /* Animation utility classes */
    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .animate-slide-in-right {
      animation: slideInRight 0.3s ease-out forwards;
    }

    .animate-scale-in {
      animation: scaleIn 0.2s ease-out forwards;
    }

    .animate-pulse-subtle {
      animation: pulse 2s ease-in-out infinite;
    }

    /* Stagger animation delays */
    .stagger-1 {
      animation-delay: 50ms;
    }

    .stagger-2 {
      animation-delay: 100ms;
    }

    .stagger-3 {
      animation-delay: 150ms;
    }

    .stagger-4 {
      animation-delay: 200ms;
    }

    .stagger-5 {
      animation-delay: 250ms;
    }

    /* ===== MICRO-INTERACTIONS ===== */
    /* Card hover lift effect */
    .card-hover {
      transition: transform var(--transition-normal) ease, box-shadow var(--transition-normal) ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    /* Button interactions */
    button,
    .btn {
      transition: all var(--transition-fast) ease;
      position: relative;
      overflow: hidden;
    }

    button:hover,
    .btn:hover {
      transform: translateY(-1px);
    }

    button:active,
    .btn:active {
      transform: scale(0.98);
    }

    /* Ripple effect container */
    .ripple-effect {
      position: relative;
      overflow: hidden;
    }

    .ripple-effect::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1) translate(-50%, -50%);
      transform-origin: 50% 50%;
    }

    .ripple-effect:active::after {
      animation: ripple 0.4s ease-out;
    }

    /* Link hover underline animation */
    .link-hover {
      position: relative;
      text-decoration: none;
    }

    .link-hover::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--color-accent);
      transition: width var(--transition-normal) ease;
    }

    .link-hover:hover::after {
      width: 100%;
    }

    /* ===== HOVER STATES ===== */
    /* Interactive element base transitions */
    a,
    button,
    input,
    select,
    textarea,
    [role="button"] {
      transition: all var(--transition-fast) ease;
    }

    /* Input focus states */
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(12, 35, 64, 0.1);
    }

    /* ===== FOCUS STATES ===== */
    *:focus-visible {
      outline: 2px solid #c89720;
      outline-offset: 2px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 99px;
      transition: background 0.3s ease;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0c2340;
    }

    /* ===== UTILITY CLASSES ===== */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Page heading style */
    .page-heading {
      font-family: "Cinzel", serif;
      font-weight: 500;
      color: #0c2340;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .page-subheading {
      font-family: "Lato", sans-serif;
      font-weight: 700;
      color: #0c2340;
      font-size: 18px;
    }

    /* Card base styles */
    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e3e1de;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-normal) ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
  </style>
  <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.5",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.552.0"
        }
      }
    </script>

</head>

<body class="bg-background text-on-background bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-background to-background dark:from-slate-900 dark:via-background dark:to-background min-h-screen">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
